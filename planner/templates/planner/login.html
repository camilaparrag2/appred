{% extends 'planner/base.html' %}
{% block title %}Iniciar sesion{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow">
    <h2 class="text-2xl font-bold text-center mb-6">Iniciar sesion</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-600 mb-1">Usuario</label>
            <input type="text" name="username" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-600 mb-1">Contrasena</label>
            <input type="password" name="password" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-700 text-white py-2 rounded-lg font-semibold hover:bg-indigo-800 transition">Ingresar</button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">¿No tienes cuenta? <a href="{% url 'register' %}" class="text-indigo-600 hover:underline">Registrate</a></p>
</div>
{% endblock %}
