<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedPlan - {% block title %}Planifica tu contenido{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <nav class="bg-indigo-700 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{% url 'dashboard' %}" class="text-2xl font-bold tracking-tight">FeedPlan</a>
            <div class="flex items-center gap-4 text-sm">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="hover:text-indigo-200 transition">Feed</a>
                    <a href="{% url 'agenda' %}" class="hover:text-indigo-200 transition">Agenda</a>
                    <span class="text-indigo-200">{{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="bg-white text-indigo-700 px-3 py-1 rounded hover:bg-indigo-100 transition">Salir</a>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:text-indigo-200 transition">Ingresar</a>
                    <a href="{% url 'register' %}" class="bg-white text-indigo-700 px-3 py-1 rounded hover:bg-indigo-100 transition">Registro</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6">
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
                    {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200
                    {% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200
                    {% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
