{% extends 'planner/base.html' %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow">
    <h2 class="text-2xl font-bold text-center mb-6">Crear cuenta</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-600 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-indigo-700 text-white py-2 rounded-lg font-semibold hover:bg-indigo-800 transition">Registrarse</button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">Ingresa</a></p>
</div>
<style>
    input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.5rem; }
    input:focus, select:focus, textarea:focus { outline: none; ring: 2px solid #6366f1; border-color: #6366f1; }
</style>
{% endblock %}
